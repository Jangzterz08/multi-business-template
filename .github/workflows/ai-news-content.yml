name: AI News Content Recorder

on:
  workflow_dispatch:
  schedule:
    # Runs every morning at 07:00 UTC.
    - cron: '0 7 * * *'

permissions:
  contents: write

jobs:
  record-ai-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Record top AI news stories
        env:
          AI_NEWS_LIMIT: ${{ vars.AI_NEWS_LIMIT }}
          AI_NEWS_QUERY: ${{ vars.AI_NEWS_QUERY }}
          AI_NEWS_LANGUAGE: ${{ vars.AI_NEWS_LANGUAGE }}
          AI_NEWS_REGION: ${{ vars.AI_NEWS_REGION }}
          AI_TELEGRAM_BOT_TOKEN: ${{ secrets.AI_TELEGRAM_BOT_TOKEN }}
          AI_TELEGRAM_CHAT_ID: ${{ vars.AI_TELEGRAM_CHAT_ID }}
          AI_TELEGRAM_SILENT: ${{ vars.AI_TELEGRAM_SILENT }}
        run: npm run news:record

      - name: Commit digest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ai-news
          if git diff --cached --quiet; then
            echo "No AI news updates to commit."
            exit 0
          fi
          git commit -m "Add AI news digest for $(date -u +%F)"
          git push
