name: AI News Sheet Sync

on:
  workflow_dispatch:
  schedule:
    # Runs every morning at 07:00 UTC.
    - cron: '0 7 * * *'

jobs:
  sync-ai-news-sheet:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync top AI news stories to Google Sheets
        env:
          AI_NEWS_LIMIT: ${{ vars.AI_NEWS_LIMIT }}
          AI_NEWS_QUERY: ${{ vars.AI_NEWS_QUERY }}
          AI_NEWS_LANGUAGE: ${{ vars.AI_NEWS_LANGUAGE }}
          AI_NEWS_REGION: ${{ vars.AI_NEWS_REGION }}
          AI_NEWS_PREFERRED_SOURCES: ${{ vars.AI_NEWS_PREFERRED_SOURCES }}
          AI_NEWS_MAX_PER_SOURCE: ${{ vars.AI_NEWS_MAX_PER_SOURCE }}
          AI_NEWS_SHEET_ID: ${{ vars.AI_NEWS_SHEET_ID }}
          AI_NEWS_SHEET_NAME: ${{ vars.AI_NEWS_SHEET_NAME }}
          AI_NEWS_GOOGLE_CLIENT_EMAIL: ${{ secrets.AI_NEWS_GOOGLE_CLIENT_EMAIL }}
          AI_NEWS_GOOGLE_PRIVATE_KEY: ${{ secrets.AI_NEWS_GOOGLE_PRIVATE_KEY }}
        run: npm run news:sheet
