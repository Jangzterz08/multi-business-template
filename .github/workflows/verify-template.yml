name: Verify Template

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - 'content/ai-news/**'

jobs:
  verify-template:
    runs-on: ubuntu-latest
    env:
      CI: true
      VITE_PRESET: education

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Run route smoke tests
        run: npm run smoke
